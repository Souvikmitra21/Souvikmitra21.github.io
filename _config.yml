# Basic Site Settings
locale            : "en-US"
title             : "Souvik Mitra"
title_separator   : "-"
name              : "Souvik Mitra"
description       : "Environmental scientist passionate about climate-smart solutions using GIS + ML"
url               : "https://souvikmitra21.github.io"
baseurl           : ""  # Do not change unless hosted in a subfolder
repository        : "Souvikmitra21/Souvikmitra21.github.io"

# Author Profile
author:
  name        : "Souvik Mitra"
  pronouns    : "he/him"
  bio         : "Environmental Researcher, UGC-NET, PhD Aspirant"
  location    : "Jharkhand, India"
  avatar      : "images/profile.png" # Make sure the image exists at this path
  email       : "mitrasouvik2001@gmail.com"
  github      : "Souvikmitra21"
  linkedin    : "https://www.linkedin.com/in/souvik-mitra-313b3321a/"

# Social Links (for SEO + sharing)
social:
  type  : "Person"
  name  : "Souvik Mitra"
  links:
    - "https://github.com/Souvikmitra21"
    - "https://www.linkedin.com/in/souvik-mitra-313b3321a/"
    - "mailto:mitrasouvik2001@gmail.com"

# Site Settings
timezone          : Asia/Kolkata
permalink         : /:title/
markdown          : kramdown
highlighter       : rouge
markdown_ext      : "markdown,mkdown,mkdn,mkd,md"

# SEO & Sharing
google_site_verification :
og_image          : "assets/images/og-image.png"  # Optional Open Graph image

# Analytics (optional)
analytics:
  provider        : false  # or "google-universal"
  google:
    tracking_id   :

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-gist
  - jekyll-redirect-from
  - jemoji

# Whitelist for GitHub Pages safe mode
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jemoji

# Collections
collections:
  publications:
    output     : true
    permalink  : /:collection/:path/
  workexp:
    output     : true
    permalink  : /:collection/:path/
  portfolio:
    output     : true
    permalink  : /:collection/:path/
  posts:
    output     : true
    permalink  : /:collection/:path/
  education:
    output     : true
    permalink  : /:collection/:path/
  projects:
    output     : true
    permalink  : /:collection/:path/

# Defaults for content
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout          : single
      author_profile  : true
      read_time       : true
      comments        : true
      share           : true
      related         : true

  - scope:
      path: ""
      type: pages
    values:
      layout          : single
      author_profile  : true

  - scope:
      path: ""
      type: publications
    values:
      layout          : single
      author_profile  : true
      share           : true
      comments        : true

  - scope:
      path: ""
      type: workexp
    values:
      layout          : single
      author_profile  : true
      share           : true

  - scope:
      path: ""
      type: portfolio
    values:
      layout          : single
      author_profile  : true
      share           : true

  - scope:
      path: ""
      type: education
    values:
      layout          : single
      author_profile  : true
      share           : true

  - scope:
      path: ""
      type: projects
    values:
      layout          : single
      author_profile  : true
      share           : true

# Archives (tags, categories)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# Feed
atom_feed:
  hide: false

# SASS (styling)
sass:
  sass_dir: _sass
  style: compressed

# Optional compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Reading settings
include:
  - .htaccess
  - _pages
exclude:
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - "*.sublime-*"
  - .sass-cache
  - .jekyll-cache
keep_files:
  - .git
